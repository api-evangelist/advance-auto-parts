naftiko: 1.0.0-alpha2
info:
  label: Advance Auto Parts Shopping
  description: Unified workflow capability for automotive parts discovery, fitment lookup, inventory checking, ordering, and
    loyalty management. Designed for automotive technicians, fleet managers, and DIY customers.
  tags:
  - Advance Auto Parts
  - Automotive
  - E-Commerce
  - Parts Catalog
  - Loyalty
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AAP_API_KEY: AAP_API_KEY
    AAP_OAUTH_TOKEN: AAP_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: aap-catalog
    baseUri: https://api.advanceautoparts.com/v1
    description: Advance Auto Parts Catalog REST API.
    authentication:
      type: apiKey
      header: X-API-Key
      token: '{{AAP_API_KEY}}'
    resources:
    - name: vehicle-years
      path: /vehicles/years
      description: Vehicle year lookup.
      operations:
      - name: list-vehicle-years
        method: GET
        description: List available vehicle model years.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vehicle-makes
      path: /vehicles/makes
      description: Vehicle make lookup.
      operations:
      - name: list-vehicle-makes
        method: GET
        description: List vehicle makes for a given year.
        inputParameters:
        - name: year
          in: query
          type: integer
          required: true
          description: Vehicle model year.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vehicle-models
      path: /vehicles/models
      description: Vehicle model lookup.
      operations:
      - name: list-vehicle-models
        method: GET
        description: List vehicle models for a given year and make.
        inputParameters:
        - name: year
          in: query
          type: integer
          required: true
          description: Vehicle model year.
        - name: makeId
          in: query
          type: string
          required: true
          description: Vehicle make identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products
      path: /products
      description: Parts catalog search.
      operations:
      - name: search-products
        method: GET
        description: Search for automotive parts by keyword or fitment.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Keyword search query.
        - name: year
          in: query
          type: integer
          required: false
          description: Vehicle year for fitment.
        - name: makeId
          in: query
          type: string
          required: false
          description: Vehicle make ID.
        - name: modelId
          in: query
          type: string
          required: false
          description: Vehicle model ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: product
      path: /products/{productId}
      description: Product detail lookup.
      operations:
      - name: get-product
        method: GET
        description: Get full product details.
        inputParameters:
        - name: productId
          in: path
          type: string
          required: true
          description: Product SKU.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: inventory
      path: /inventory
      description: Store inventory check.
      operations:
      - name: check-inventory
        method: GET
        description: Check product availability at nearby stores.
        inputParameters:
        - name: productId
          in: query
          type: string
          required: true
          description: Product SKU.
        - name: zip
          in: query
          type: string
          required: false
          description: ZIP code for nearby stores.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stores
      path: /stores
      description: Store location search.
      operations:
      - name: get-stores
        method: GET
        description: Find Advance Auto Parts stores near a location.
        inputParameters:
        - name: zip
          in: query
          type: string
          required: false
          description: ZIP code to search near.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8090
    namespace: aap-shopping-api
    description: Unified REST API for Advance Auto Parts catalog search, inventory, ordering, and loyalty.
    resources:
    - path: /v1/parts
      name: parts
      description: Parts catalog search.
      operations:
      - method: GET
        name: search-parts
        description: Search for automotive parts.
        call: aap-catalog.search-products
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/parts/{productId}
      name: part
      description: Part details.
      operations:
      - method: GET
        name: get-part
        description: Get automotive part details.
        call: aap-catalog.get-product
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/inventory
      name: inventory
      description: Store inventory.
      operations:
      - method: GET
        name: check-inventory
        description: Check part inventory at stores.
        call: aap-catalog.check-inventory
        with:
          productId: rest.productId
          zip: rest.zip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: aap-shopping-mcp
    transport: http
    description: MCP server for AI-assisted automotive parts shopping — find parts, check availability, and manage orders.
    tools:
    - name: search-auto-parts
      description: Search for automotive parts by keyword, part number, or vehicle year/make/model.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.search-products
      with:
        q: tools.q
        year: tools.year
        makeId: tools.makeId
        modelId: tools.modelId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-part-details
      description: Get full specifications, fitment notes, and pricing for a specific automotive part.
      hints:
        readOnly: true
        openWorld: false
      call: aap-catalog.get-product
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
    - name: check-part-availability
      description: Check if an automotive part is in stock at nearby Advance Auto Parts stores.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.check-inventory
      with:
        productId: tools.productId
        zip: tools.zip
      outputParameters:
      - type: object
        mapping: $.
    - name: find-nearby-stores
      description: Find Advance Auto Parts store locations near a ZIP code or city.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.get-stores
      with:
        zip: tools.zip
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-vehicle-makes
      description: Get available vehicle makes for a given model year for fitment-based part search.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.list-vehicle-makes
      with:
        year: tools.year
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-vehicle-models
      description: Get available vehicle models for a year and make for fitment-based part search.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.list-vehicle-models
      with:
        year: tools.year
        makeId: tools.makeId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vehicle-years
      description: Get the range of supported vehicle model years for parts catalog lookups.
      hints:
        readOnly: true
        openWorld: true
      call: aap-catalog.list-vehicle-years
      outputParameters:
      - type: object
        mapping: $.
