naftiko: 1.0.0-alpha2
info:
  label: Advance Auto Parts Catalog API — Stores
  description: 'Advance Auto Parts Catalog API — Stores. 1 operations. Lead operation: Advance Auto Parts List Nearby Stores.
    Self-contained Naftiko capability covering one Advance Auto Parts business surface.'
  tags:
  - Advance Auto Parts
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCE_AUTO_PARTS_API_KEY: ADVANCE_AUTO_PARTS_API_KEY
capability:
  consumes:
  - type: http
    namespace: catalog-stores
    baseUri: https://api.advanceautoparts.com/v1
    description: Advance Auto Parts Catalog API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: stores
      path: /stores
      operations:
      - name: getstores
        method: GET
        description: Advance Auto Parts List Nearby Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zip
          in: query
          type: string
          description: ZIP code to search near.
        - name: lat
          in: query
          type: number
          description: Latitude coordinate.
        - name: lon
          in: query
          type: number
          description: Longitude coordinate.
        - name: radius
          in: query
          type: integer
          description: Search radius in miles.
        - name: limit
          in: query
          type: integer
          description: Maximum number of stores to return.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADVANCE_AUTO_PARTS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: catalog-stores-rest
    port: 8080
    description: REST adapter for Advance Auto Parts Catalog API — Stores. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stores
      name: stores
      description: REST surface for stores.
      operations:
      - method: GET
        name: getstores
        description: Advance Auto Parts List Nearby Stores
        call: catalog-stores.getstores
        with:
          zip: rest.zip
          lat: rest.lat
          lon: rest.lon
          radius: rest.radius
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: catalog-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Advance Auto Parts Catalog API — Stores. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: advance-auto-parts-list-nearby
      description: Advance Auto Parts List Nearby Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: catalog-stores.getstores
      with:
        zip: tools.zip
        lat: tools.lat
        lon: tools.lon
        radius: tools.radius
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
