naftiko: 1.0.0-alpha2
info:
  label: Advance Auto Parts Commerce API — Orders
  description: 'Advance Auto Parts Commerce API — Orders. 3 operations. Lead operation: Advance Auto Parts List Orders. Self-contained
    Naftiko capability covering one Advance Auto Parts business surface.'
  tags:
  - Advance Auto Parts
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCE_AUTO_PARTS_API_KEY: ADVANCE_AUTO_PARTS_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-orders
    baseUri: https://api.advanceautoparts.com/commerce/v1
    description: Advance Auto Parts Commerce API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: getorders
        method: GET
        description: Advance Auto Parts List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Filter orders placed on or after this date (ISO 8601).
        - name: endDate
          in: query
          type: string
          description: Filter orders placed on or before this date (ISO 8601).
        - name: status
          in: query
          type: string
          description: Filter by order status.
        - name: limit
          in: query
          type: integer
          description: Maximum number of orders to return.
        - name: offset
          in: query
          type: integer
          description: Pagination offset.
      - name: createorder
        method: POST
        description: Advance Auto Parts Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Advance Auto Parts Get Order Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          description: Order identifier.
          required: true
    authentication:
      type: bearer
      token: '{{env.ADVANCE_AUTO_PARTS_API_KEY}}'
  exposes:
  - type: rest
    namespace: commerce-orders-rest
    port: 8080
    description: REST adapter for Advance Auto Parts Commerce API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: getorders
        description: Advance Auto Parts List Orders
        call: commerce-orders.getorders
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          status: rest.status
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorder
        description: Advance Auto Parts Create Order
        call: commerce-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Advance Auto Parts Get Order Details
        call: commerce-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Advance Auto Parts Commerce API — Orders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: advance-auto-parts-list-orders
      description: Advance Auto Parts List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-orders.getorders
      with:
        startDate: tools.startDate
        endDate: tools.endDate
        status: tools.status
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: advance-auto-parts-create-order
      description: Advance Auto Parts Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: commerce-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: advance-auto-parts-get-order
      description: Advance Auto Parts Get Order Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
