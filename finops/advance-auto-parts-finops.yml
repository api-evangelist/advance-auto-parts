tags:
  - FinOps
  - FOCUS
  - Automotive
  - Retail
description: 'FOCUS-aligned FinOps for Advance Auto Parts: B2B partnership billing for catalog
  and commerce integrations.'
sources:
  - https://shop.advanceautoparts.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Advance Auto Parts, Inc.
serviceCategory: Automotive Retail
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Advance Auto Parts
  ServiceCategory: Automotive Retail
  ProviderName: Advance Auto Parts
  PublisherName: Advance Auto Parts, Inc.
  InvoiceIssuerName: Advance Auto Parts, Inc.
  BillingCurrency: USD
meters:
  - name: catalog_lookups
    unit: request
    aggregation: sum
    dimensions:
      - partner
      - environment
  - name: orders_placed
    unit: order
    aggregation: sum
    dimensions:
      - partner
      - region
  - name: subscription_fees
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Reconcile partner-scoped usage reports against monthly Advance Auto Parts invoices.
  - name: Allocation
    description: Tag catalog lookups and orders with the consuming product/team.
  - name: Optimization
    description: Cache product reference data; batch inventory polls; consolidate orders to lower
      per-order fees.
  - name: Accountability
    description: Assign B2B integration budget owner; review monthly variance.
